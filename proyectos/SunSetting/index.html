<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunSetting by Juan Tomoo - Audio Generativo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Monoton&family=VT323&family=Orbitron:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #05020a; font-family: 'VT323', monospace;
            touch-action: none; color: #fff;
        }

        #crt-container {
            width: 100vw; height: 100vh; position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #title {
            position: absolute; top: 6%; width: 100%; text-align: center;
            font-family: 'Monoton', cursive; font-size: clamp(1.8rem, 5vw, 4rem);
            color: #ffd700; text-transform: uppercase;
            text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff;
            pointer-events: none; z-index: 5; letter-spacing: 4px;
            animation: flicker 4s infinite alternate;
        }

        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 1; }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.8; }
        }

        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

        /* HUD MEJORADO: El scroll ahora está en un contenedor interno para no cortar el botón */
        #hud {
            position: absolute; right: -300px; top: 0; width: 300px; height: 100%;
            background: rgba(5, 2, 10, 0.95); backdrop-filter: blur(15px);
            border-left: 2px solid #ff00ff; z-index: 100;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Orbitron', sans-serif;
        }

        #hud.open { right: 0; }

        /* Contenedor interno para hacer scroll sin esconder el botón toggle */
        .hud-content {
            width: 100%; height: 100%; padding: 25px;
            overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* Estilo para la barra de scroll del menú */
        .hud-content::-webkit-scrollbar { width: 5px; }
        .hud-content::-webkit-scrollbar-track { background: rgba(5, 2, 10, 0.5); }
        .hud-content::-webkit-scrollbar-thumb { background: #ff00ff; border-radius: 5px; }

        #hud-toggle {
            position: absolute; left: -40px; top: 20px; width: 40px; height: 40px;
            background: #ff00ff; border: none; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center; border-radius: 5px 0 0 5px;
            box-shadow: -5px 0 15px rgba(255, 0, 255, 0.4);
            z-index: 101; /* Asegura que el botón esté por encima */
        }

        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .control-group label { font-size: 0.6rem; text-transform: uppercase; color: #00ffff; letter-spacing: 1px; display: flex; justify-content: space-between; }
        .time-display, .val-display { color: #ffd700; font-weight: bold; font-family: 'VT323'; font-size: 1.1rem; }
        
        input[type="range"], select {
            width: 100%; height: 4px; background: #330033; border-radius: 2px; appearance: none; cursor: pointer;
        }
        select { height: 25px; background: #1a0a2e; color: #ffd700; border: 1px solid #ff00ff; font-family: 'VT323'; font-size: 1rem; }
        
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 12px; height: 12px; background: #00ffff; border-radius: 50%;
            box-shadow: 0 0 10px #00ffff;
        }

        .checkbox-group { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; cursor: pointer; color: #ffd700; }

        #scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 10;
            will-change: background-position;
        }

        .hud-header { font-size: 1rem; border-bottom: 1px solid #ff00ff; padding-bottom: 8px; color: #ff00ff; margin-bottom: 5px; flex-shrink: 0; }

        .audio-section { background: rgba(255,0,255,0.05); padding: 10px; border-radius: 5px; border: 1px solid rgba(255,0,255,0.2); display: flex; flex-direction: column; gap: 10px; }
        .channel-switches { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .channel-switches .checkbox-group { font-size: 0.62rem; }
        .step-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }
        .step-btn {
            height: 26px;
            border: 1px solid #ff00ff;
            background: #140824;
            color: #ffd700;
            font-family: 'VT323', monospace;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .step-btn:hover { transform: translateY(-1px); }
        .step-btn.active {
            background: rgba(0, 255, 255, 0.25);
            border-color: #00ffff;
            color: #00ffff;
        }
        .step-btn.playing {
            box-shadow: 0 0 10px #ffd700;
            border-color: #ffd700;
        }
        .audio-note {
            font-size: 0.63rem;
            color: #ff9dfd;
            opacity: 0.85;
            line-height: 1.2;
        }
        .action-row {
            display: flex;
            gap: 6px;
        }
        .action-btn {
            flex: 1;
            height: 30px;
            border: 1px solid #00ffff;
            background: #180d2a;
            color: #00ffff;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .action-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.45);
        }
        .action-btn.secondary {
            border-color: #ff00ff;
            color: #ff9dfd;
        }
        .action-btn.secondary:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.45);
        }

        /* Pantalla de inicio de Audio Obligatoria por Navegadores */
        #audio-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 2, 10, 0.9); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        #btn-start {
            background: rgba(26, 0, 51, 0.8); border: 2px solid #00ffff; color: #00ffff;
            padding: 15px 40px; font-family: 'VT323', monospace; font-size: 2rem;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
        }
        #btn-start:hover { background: #00ffff; color: #05020a; box-shadow: 0 0 30px #00ffff; }

        /* Performance indicator */
        #perf-indicator {
            position: absolute; top: 10px; left: 10px; z-index: 50;
            font-family: 'VT323', monospace; font-size: 0.8rem;
            color: #00ffff; opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Overlay inicial para el Audio -->
    <div id="audio-overlay">
        <h1 style="font-family: 'Monoton', cursive; color: #ff00ff; margin-bottom: 30px; font-weight: normal; text-align: center;">SUNSETTING<br><span style="font-size: 1.2rem; font-family: 'VT323'; color: #ffd700; letter-spacing: 2px;">SISTEMA DE AUDIO PREPARADO</span></h1>
        <button id="btn-start">INICIAR EXPERIENCIA</button>
    </div>

    <div id="crt-container">
        <div id="title">SUNSETTING</div>
        
        <aside id="hud">
            <button id="hud-toggle">☰</button>
            <div class="hud-content">
                <div class="hud-header">SYSTEM v2.2</div>
                
                <div class="control-group">
                    <label>Mirar hacia el...</label>
                    <select id="param-view">
                        <option value="sunrise">ESTE (Amanecer)</option>
                        <option value="sunset" selected>OESTE (Atardecer)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Tiempo <span id="time-label" class="time-display">12:00</span></label>
                    <input type="range" id="param-time" min="0" max="24" step="0.01" value="17.8">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="param-sync">
                    <span>Reloj Local</span>
                </div>

                <div class="control-group">
                    <label>Velocidad Órbita</label>
                    <input type="range" id="param-speed" min="0" max="0.05" step="0.001" value="0.005">
                </div>

                <div class="control-group">
                    <label>Vapor Pixel</label>
                    <input type="range" id="param-res" min="100" max="600" step="10" value="320">
                </div>

                <div class="control-group">
                    <label>Fov Horizon</label>
                    <input type="range" id="param-cam" min="0.3" max="0.8" step="0.01" value="0.55">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="param-mountains" checked>
                    <span>Montañas Distantes</span>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="param-loop" checked>
                    <span>Órbita Automática</span>
                </div>

                <div class="hud-header" style="margin-top: 10px;">AUDIO (SYNTH)</div>
                <div class="audio-section">
                    <div class="control-group">
                        <label>Volumen <span id="vol-label" class="val-display">80%</span></label>
                        <input type="range" id="audio-vol" min="0" max="1" step="0.01" value="0.8">
                    </div>
                    
                    <div class="control-group">
                        <label>Tempo (BPM) <span id="bpm-label" class="val-display">90</span></label>
                        <input type="range" id="audio-bpm" min="60" max="140" step="1" value="90">
                    </div>

                    <div class="control-group">
                        <label>Tonica <span id="root-label" class="val-display">F</span></label>
                        <select id="seq-root">
                            <option value="36">C</option>
                            <option value="37">C#</option>
                            <option value="38">D</option>
                            <option value="39">D#</option>
                            <option value="40">E</option>
                            <option value="41" selected>F</option>
                            <option value="42">F#</option>
                            <option value="43">G</option>
                            <option value="44">G#</option>
                            <option value="45">A</option>
                            <option value="46">A#</option>
                            <option value="47">B</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Swing <span id="swing-label" class="val-display">8%</span></label>
                        <input type="range" id="seq-swing" min="0" max="0.35" step="0.01" value="0.08">
                    </div>

                    <div class="control-group">
                        <label>Escala <span id="scale-label" class="val-display">Menor</span></label>
                        <select id="seq-scale">
                            <option value="minor" selected>Menor Natural</option>
                            <option value="phrygian">Frigia</option>
                            <option value="dorian">Dorica</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Reverb <span id="reverb-label" class="val-display">28%</span></label>
                        <input type="range" id="audio-reverb" min="0" max="1" step="0.01" value="0.28">
                    </div>

                    <div class="control-group">
                        <label>Limiter <span id="limiter-label" class="val-display">-1.0 dB</span></label>
                        <input type="range" id="limiter-threshold" min="-12" max="-1" step="0.5" value="-1">
                    </div>

                    <div class="control-group" style="margin-top: 5px;">
                        <label style="color: #ff00ff;">CANALES</label>
                        <label>Kick <span id="ch-kick-label" class="val-display">85%</span></label>
                        <input type="range" id="ch-kick" min="0" max="1" step="0.01" value="0.85">
                    </div>
                    <div class="control-group">
                        <label>Snare <span id="ch-snare-label" class="val-display">70%</span></label>
                        <input type="range" id="ch-snare" min="0" max="1" step="0.01" value="0.7">
                    </div>
                    <div class="control-group">
                        <label>Bass <span id="ch-bass-label" class="val-display">78%</span></label>
                        <input type="range" id="ch-bass" min="0" max="1" step="0.01" value="0.78">
                    </div>
                    <div class="control-group">
                        <label>Pad <span id="ch-pad-label" class="val-display">42%</span></label>
                        <input type="range" id="ch-pad" min="0" max="1" step="0.01" value="0.42">
                    </div>
                    <div class="control-group">
                        <label>Arp <span id="ch-melody-label" class="val-display">50%</span></label>
                        <input type="range" id="ch-melody" min="0" max="1" step="0.01" value="0.5">
                    </div>

                    <div class="channel-switches">
                        <label class="checkbox-group"><input type="checkbox" id="ch-kick-on" checked><span>Kick</span></label>
                        <label class="checkbox-group"><input type="checkbox" id="ch-snare-on" checked><span>Snare</span></label>
                        <label class="checkbox-group"><input type="checkbox" id="ch-bass-on" checked><span>Bass</span></label>
                        <label class="checkbox-group"><input type="checkbox" id="ch-pad-on" checked><span>Pad</span></label>
                        <label class="checkbox-group"><input type="checkbox" id="ch-melody-on" checked><span>Arp</span></label>
                    </div>

                    <div class="control-group" style="margin-top: 5px;">
                        <label style="color: #ff00ff;">SECUENCIADOR 16 STEPS</label>
                        <div class="action-row">
                            <button type="button" id="audio-toggle" class="action-btn">PAUSAR</button>
                            <button type="button" id="seq-randomize" class="action-btn secondary">ALEATORIO</button>
                        </div>
                        <div class="action-row">
                            <button type="button" id="seq-fill" class="action-btn">LLENAR</button>
                            <button type="button" id="seq-clear" class="action-btn secondary">LIMPIAR</button>
                        </div>
                        <div id="seq-grid" class="step-grid">
                            <button type="button" id="step-0" class="step-btn active" data-step="0">1</button>
                            <button type="button" id="step-1" class="step-btn" data-step="1">2</button>
                            <button type="button" id="step-2" class="step-btn active" data-step="2">3</button>
                            <button type="button" id="step-3" class="step-btn" data-step="3">4</button>
                            <button type="button" id="step-4" class="step-btn active" data-step="4">5</button>
                            <button type="button" id="step-5" class="step-btn active" data-step="5">6</button>
                            <button type="button" id="step-6" class="step-btn" data-step="6">7</button>
                            <button type="button" id="step-7" class="step-btn active" data-step="7">8</button>
                            <button type="button" id="step-8" class="step-btn active" data-step="8">9</button>
                            <button type="button" id="step-9" class="step-btn" data-step="9">10</button>
                            <button type="button" id="step-10" class="step-btn active" data-step="10">11</button>
                            <button type="button" id="step-11" class="step-btn" data-step="11">12</button>
                            <button type="button" id="step-12" class="step-btn active" data-step="12">13</button>
                            <button type="button" id="step-13" class="step-btn active" data-step="13">14</button>
                            <button type="button" id="step-14" class="step-btn" data-step="14">15</button>
                            <button type="button" id="step-15" class="step-btn active" data-step="15">16</button>
                        </div>
                        <p class="audio-note">Los steps activos controlan el arpegio automatico en tiempo real.</p>
                    </div>

                    <div class="control-group" style="margin-top: 5px;">
                        <label style="color: #ff00ff;">ECUALIZADOR</label>
                        <label>Bajos <span id="eq-low-label" class="val-display">0 dB</span></label>
                        <input type="range" id="eq-low" min="-15" max="15" step="1" value="0">
                    </div>
                    <div class="control-group">
                        <label>Medios <span id="eq-mid-label" class="val-display">0 dB</span></label>
                        <input type="range" id="eq-mid" min="-15" max="15" step="1" value="0">
                    </div>
                    <div class="control-group">
                        <label>Altos <span id="eq-high-label" class="val-display">0 dB</span></label>
                        <input type="range" id="eq-high" min="-15" max="15" step="1" value="0">
                    </div>
                </div>

                <div class="control-group" style="margin-top: auto; padding-top: 20px; opacity: 0.5; font-size: 9px; color: #ff00ff;">
                    <p>Experiencia creada por <a href="https://juantomoo.github.io" target="_blank" rel="noopener noreferrer" style="color: #00ffff;">Juan Tomoo</a> · <a href="https://instagram.com/juantomoo" target="_blank" rel="noopener noreferrer" style="color: #00ffff;">Instagram</a></p>
                    <p style="margin-top: 4px;">Audio Generativo Web API</p>
                </div>
            </div>
        </aside>

        <canvas id="screen"></canvas>
        <div id="scanlines"></div>
    </div>

    <script src="./synthwave-audio.js"></script>
    <script>
        // ==========================================
        // SISTEMA DE DETECCIÓN DE RENDIMIENTO
        // ==========================================
        const PerformanceManager = {
            isMobile: false,
            isLowEnd: false,
            targetFPS: 60,
            frameTime: 1000 / 60,
            lastFrameTime: 0,
            frameCount: 0,
            fpsCheckInterval: 500,
            lastFPSCheck: 0,
            currentFPS: 60,
            skipFrames: 0,
            
            // Detectar capacidades del dispositivo
            detectCapabilities() {
                // Detectar móvil por heuristics
                const ua = navigator.userAgent.toLowerCase();
                this.isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua);
                
                // Detectar baja memoria o baja potencia
                const memory = navigator.deviceMemory || 4;
                const cores = navigator.hardwareConcurrency || 4;
                
                // Clasificar como low-end si:
                // - Menos de 4GB de RAM
                // - Menos de 4 cores
                // - Dispositivo móvil con baja memoria
                this.isLowEnd = (memory < 4) || (cores < 4) || (this.isMobile && memory < 6);
                
                // En móviles, reducir resolución máxima por defecto
                if (this.isMobile) {
                    const resSlider = document.getElementById('param-res');
                    if (resSlider) {
                        resSlider.max = '320'; // Limitar máximo en móviles
                        if (parseInt(resSlider.value) > 320) {
                            resSlider.value = '240';
                        }
                    }
                }
                
                // Ajustar FPS objetivo
                if (this.isLowEnd) {
                    this.targetFPS = 30;
                    this.frameTime = 1000 / 30;
                } else if (this.isMobile) {
                    this.targetFPS = 45;
                    this.frameTime = 1000 / 45;
                }
                
                console.log(`[Performance] Device: ${this.isMobile ? 'Mobile' : 'Desktop'}, Low-end: ${this.isLowEnd}, Target FPS: ${this.targetFPS}`);
                return this;
            },
            
            // Verificar si debemos saltarnos este frame
            shouldSkipFrame(timestamp) {
                const elapsed = timestamp - this.lastFrameTime;
                
                // Contar frames para medir FPS real
                this.frameCount++;
                if (timestamp - this.lastFPSCheck >= this.fpsCheckInterval) {
                    this.currentFPS = (this.frameCount * 1000) / (timestamp - this.lastFPSCheck);
                    this.frameCount = 0;
                    this.lastFPSCheck = timestamp;
                    
                    // Auto-ajustar si FPS real es muy bajo
                    if (this.currentFPS < this.targetFPS * 0.6 && this.targetFPS > 24) {
                        this.targetFPS = Math.max(24, this.targetFPS - 5);
                        this.frameTime = 1000 / this.targetFPS;
                        console.log(`[Performance] Reducing to ${this.targetFPS} FPS`);
                    }
                }
                
                // Skip si no ha pasado suficiente tiempo
                if (elapsed < this.frameTime) {
                    this.skipFrames++;
                    return true;
                }
                
                // Calcular drift
                if (elapsed >= this.frameTime) {
                    this.lastFrameTime = timestamp - (elapsed % this.frameTime);
                }
                
                return false;
            },
            
            // Obtener factor de calidad según dispositivo
            getQualityMultiplier() {
                if (this.isLowEnd) return 0.5;
                if (this.isMobile) return 0.7;
                return 1.0;
            }
        };

        // Inicializar detección
        PerformanceManager.detectCapabilities();

        // ==========================================
        // 1. SISTEMA VISUAL (OPTIMIZADO)
        // ==========================================
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d', { alpha: false });
        const buffer = document.createElement('canvas');
        const bCtx = buffer.getContext('2d', { alpha: false });

        const hud = document.getElementById('hud');
        const hudToggle = document.getElementById('hud-toggle');
        const timeLabel = document.getElementById('time-label');
        const inputs = {
            time: document.getElementById('param-time'),
            res: document.getElementById('param-res'),
            cam: document.getElementById('param-cam'),
            loop: document.getElementById('param-loop'),
            speed: document.getElementById('param-speed'),
            sync: document.getElementById('param-sync'),
            view: document.getElementById('param-view'),
            mountains: document.getElementById('param-mountains')
        };

        hudToggle.onclick = () => hud.classList.toggle('open');

        const pal = {
            night: '#05020a', 
            deepPurple: '#1a0033',
            electricViolet: '#4d0099',
            hotPink: '#ff00ff',
            neonCyan: '#00ffff',
            gold: '#ffd700',
            sunDay: '#ffffff',
            sunSunset: '#ff6600',
            sunHorizon: '#ff0033'
        };

        let state = {
            animTime: 0,
            width: 320,
            height: 180,
            mouse: { x: 0.5, y: 0.5 },
            stars: [],
            mtns: [],
            // Cache de valores pre-calculados
            starCache: [],
            reflectionCache: null,
            lastResValue: 0,
            needsFullRedraw: true,
            lastGlitchTime: 0,
            glitchInterval: 5000 // Mínimo 5s entre glitches
        };

        // Inicializar estrellas con cache
        function initStars(count) {
            state.stars = [];
            state.starCache = [];
            for (let i = 0; i < count; i++) {
                const star = { 
                    x: Math.random(), 
                    y: Math.random(), 
                    s: Math.random() * 1.2 + 0.5, 
                    t: Math.random() * 10 
                };
                state.stars.push(star);
                // Pre-calcular valores de brillo
                state.starCache.push({
                    baseAlpha: Math.random() * 0.5 + 0.3,
                    twinkleSpeed: Math.random() * 2 + 1
                });
            }
        }

        // Inicializar montañas
        function initMountains() {
            state.mtns = [];
            for (let i = 0; i < 5; i++) {
                state.mtns.push({ 
                    h: (25 + Math.random() * 35) / 180, 
                    x: i * 0.2, 
                    w: 0.25 + Math.random() * 0.2
                });
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const resValue = parseInt(inputs.res.value);
            
            // Limitar resolución en móviles
            const maxRes = PerformanceManager.isMobile ? 320 : 600;
            const clampedRes = Math.min(resValue, maxRes);
            
            state.width = clampedRes;
            state.height = Math.round(clampedRes * (canvas.height / canvas.width));
            buffer.width = state.width;
            buffer.height = state.height;
            ctx.imageSmoothingEnabled = false;
            
            // Re-inicializar elementos si cambió la resolución significativamente
            if (Math.abs(state.lastResValue - clampedRes) > 50) {
                state.lastResValue = clampedRes;
                state.needsFullRedraw = true;
                
                // Ajustar cantidad de estrellas según resolución
                const qualityMult = PerformanceManager.getQualityMultiplier();
                const starCount = Math.round(300 * qualityMult);
                initStars(starCount);
                initMountains();
            }
            
            // Limpiar caches
            state.reflectionCache = null;
        }

        window.addEventListener('resize', resize);
        inputs.res.oninput = () => {
            state.needsFullRedraw = true;
            resize();
        };

        window.addEventListener('mousemove', e => {
            state.mouse.x = e.clientX / window.innerWidth;
            state.mouse.y = e.clientY / window.innerHeight;
        });

        // Touch events para móvil (throttled)
        let touchThrottle = 0;
        window.addEventListener('touchmove', e => {
            const now = Date.now();
            if (now - touchThrottle > 50) { // Throttle touch a 20fps
                touchThrottle = now;
                state.mouse.x = e.touches[0].clientX / window.innerWidth;
                state.mouse.y = e.touches[0].clientY / window.innerHeight;
            }
        }, { passive: true });

        function parseToRgb(color) {
            if (color.startsWith('#')) {
                const r = parseInt(color.slice(1,3), 16);
                const g = parseInt(color.slice(3,5), 16);
                const b = parseInt(color.slice(5,7), 16);
                return {r, g, b};
            }
            if (color.startsWith('rgb')) {
                const match = color.match(/\d+/g);
                if (match) return {r: parseInt(match[0]), g: parseInt(match[1]), b: parseInt(match[2])};
            }
            return {r: 0, g: 0, b: 0};
        }

        function lerpCol(c1, c2, f) {
            f = Math.max(0, Math.min(1, f));
            const rgb1 = parseToRgb(c1);
            const rgb2 = parseToRgb(c2);
            
            const r = Math.round(rgb1.r + (rgb2.r - rgb1.r) * f);
            const g = Math.round(rgb1.g + (rgb2.g - rgb1.g) * f);
            const b = Math.round(rgb1.b + (rgb2.b - rgb1.b) * f);
            
            return `rgb(${isNaN(r)?0:r},${isNaN(g)?0:g},${isNaN(b)?0:b})`;
        }

        // Pre-calcular valores de brillo de estrellas
        function precomputeStarAlpha(animTime) {
            return state.stars.map((s, i) => {
                const cache = state.starCache[i];
                return cache.baseAlpha * (Math.sin(animTime * cache.twinkleSpeed + s.t) * 0.5 + 0.5);
            });
        }

        function draw(timestamp) {
            // Performance: Frame skipping
            if (PerformanceManager.shouldSkipFrame(timestamp)) {
                requestAnimationFrame(draw);
                return;
            }

            state.animTime += 0.012;

            if (inputs.sync.checked) {
                const now = new Date();
                inputs.time.value = now.getHours() + now.getMinutes() / 60;
            } else if (inputs.loop.checked) {
                const step = parseFloat(inputs.speed.value);
                inputs.time.value = (parseFloat(inputs.time.value) + step) % 24;
            }
            
            const time = parseFloat(inputs.time.value);
            timeLabel.innerText = `${Math.floor(time).toString().padStart(2,'0')}:${Math.floor((time%1)*60).toString().padStart(2,'0')}`;

            const horizonY = state.height * parseFloat(inputs.cam.value);
            const isSunrise = inputs.view.value === 'sunrise';
            const orbitY = Math.sin(((time - 6) / 12) * Math.PI); 
            
            let z = -1;
            if (isSunrise && time >= 6 && time <= 12) z = (time - 6) / 6;
            else if (!isSunrise && time >= 12 && time <= 18) z = 1 - (time - 12) / 6;

            let skyTop, skyBot, sunColor, glowColor, flareAlpha = 0;

            if (orbitY > 0) {
                const f = orbitY;
                skyTop = lerpCol(pal.deepPurple, '#0022ff', f);
                skyBot = lerpCol(pal.hotPink, pal.neonCyan, f);
                
                if (f < 0.3) {
                    sunColor = lerpCol(pal.sunHorizon, pal.gold, f/0.3);
                    glowColor = 'rgba(255, 0, 255, 0.4)';
                } else {
                    sunColor = lerpCol(pal.gold, pal.sunDay, (f-0.3)/0.7);
                    glowColor = 'rgba(0, 255, 255, 0.2)';
                    flareAlpha = (f - 0.5) * 2;
                }
            } else {
                const f = Math.min(1, Math.abs(orbitY) * 2);
                skyTop = lerpCol(pal.deepPurple, pal.night, f);
                skyBot = lerpCol(pal.hotPink, pal.deepPurple, f);
                sunColor = 'rgba(0,0,0,0)'; 
            }

            // Fondo Cielo
            const skyGrad = bCtx.createLinearGradient(0, 0, 0, horizonY);
            skyGrad.addColorStop(0, skyTop); skyGrad.addColorStop(1, skyBot);
            bCtx.fillStyle = skyGrad; bCtx.fillRect(0, 0, state.width, horizonY);

            // Estrellas - Optimizado con pre-cálculo
            const starAlpha = Math.max(0, -orbitY);
            if (starAlpha > 0.05) {
                bCtx.fillStyle = pal.neonCyan;
                const alphas = precomputeStarAlpha(state.animTime);
                const qualityMult = PerformanceManager.getQualityMultiplier();
                const step = qualityMult < 0.7 ? 2 : 1; // Saltar estrellas en low-end
                
                for (let i = 0; i < state.stars.length; i += step) {
                    const s = state.stars[i];
                    bCtx.globalAlpha = starAlpha * alphas[i];
                    bCtx.fillRect(s.x * state.width, s.y * horizonY, s.s, s.s);
                }
                bCtx.globalAlpha = 1;
            }

            // El Sol (Detrás de montañas)
            const lookX = (state.mouse.x - 0.5) * 0.1;
            const sx = state.width / 2 + (lookX * state.width);
            const yPosFactor = Math.sin(z * Math.PI / 2);
            const sy = horizonY - (yPosFactor * state.height * 1.15);

            if (z >= 0 && z <= 1) {
                const sunR = (state.height * 0.04) + (z * state.height * 0.38);

                // Glow Atmosférico
                bCtx.save();
                bCtx.globalCompositeOperation = 'screen';
                const glow = bCtx.createRadialGradient(sx, sy, sunR*0.1, sx, sy, sunR * (3 - z*1.5));
                glow.addColorStop(0, glowColor);
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                bCtx.fillStyle = glow;
                bCtx.beginPath(); bCtx.arc(sx, sy, sunR*4, 0, Math.PI*2); bCtx.fill();
                bCtx.restore();

                // Lens Flare
                if (flareAlpha > 0) {
                    bCtx.save();
                    bCtx.globalCompositeOperation = 'screen';
                    bCtx.globalAlpha = flareAlpha * 0.3;
                    const fx = state.width - sx;
                    const fy = state.height - sy;
                    const flareStep = PerformanceManager.isLowEnd ? 2 : 1;
                    for(let j=1; j<4; j+=flareStep) {
                        bCtx.fillStyle = j % 2 === 0 ? pal.neonCyan : pal.hotPink;
                        bCtx.beginPath(); bCtx.arc(sx + (fx-sx)*j*0.2, sy + (fy-sy)*j*0.2, sunR*(0.1*j), 0, Math.PI*2); bCtx.fill();
                    }
                    bCtx.restore();
                }

                // Sol con Líneas - Optimizado
                bCtx.save();
                bCtx.beginPath(); bCtx.arc(sx, sy, sunR, 0, Math.PI * 2); bCtx.clip();
                bCtx.fillStyle = sunColor;
                const lineStep = PerformanceManager.isLowEnd ? 3 : 1.5;
                for(let i = -sunR; i < sunR; i += lineStep) {
                    const py = sy + i;
                    if (py > horizonY) continue;
                    let alpha = 1;
                    if (i > 0) {
                        const gap = (i / sunR) * 12 * (1-z);
                        if (i % 6 < gap) alpha = 0.15;
                    }
                    bCtx.globalAlpha = alpha;
                    const w = Math.sqrt(sunR*sunR - i*i) * 2;
                    bCtx.fillRect(sx - w/2, py, w, 1.2);
                }
                bCtx.restore();
            }

            // Montañas
            if (inputs.mountains.checked) {
                bCtx.save();
                const mtnBase = lerpCol(skyBot, pal.night, 0.9); 
                const mtnTop = lerpCol(skyBot, pal.night, 1.0);

                // Reducir iteraciones en low-end
                const mtnStep = PerformanceManager.isLowEnd ? 2 : 1;
                const mtnCount = PerformanceManager.isLowEnd ? 3 : 5;
                
                for (let i = 0; i < mtnCount; i++) {
                    const m = state.mtns[i * mtnStep] || state.mtns[0];
                    const parallaxFactor = 1 + i * 0.6;
                    const mx = ((m.x + lookX * parallaxFactor) % 1) * state.width;
                    const mw = m.w * state.width;
                    const mh = m.h * state.height;
                    
                    const mGrad = bCtx.createLinearGradient(mx, horizonY - mh, mx, horizonY);
                    mGrad.addColorStop(0, mtnTop);
                    mGrad.addColorStop(1, mtnBase);
                    bCtx.fillStyle = mGrad;

                    const drawMtn = (offs) => {
                        bCtx.beginPath();
                        bCtx.moveTo(mx - mw + offs, horizonY);
                        bCtx.lineTo(mx + offs, horizonY - mh);
                        bCtx.lineTo(mx + mw + offs, horizonY);
                        bCtx.fill();
                    };

                    drawMtn(0);
                    drawMtn(state.width);
                    drawMtn(-state.width);
                }
                bCtx.restore();
            }

            // Mar y Reflejo
            const oceanGrad = bCtx.createLinearGradient(0, horizonY, 0, state.height);
            oceanGrad.addColorStop(0, '#0a0020'); oceanGrad.addColorStop(1, '#150030');
            bCtx.fillStyle = oceanGrad; bCtx.fillRect(0, horizonY, state.width, state.height - horizonY);

            // Reflejo en Agua - Optimizado con menos iteraciones
            if (z >= 0 && z <= 1) {
                bCtx.save();
                bCtx.globalCompositeOperation = 'screen';
                // Reducir iteraciones en dispositivos lentos
                const reflSteps = PerformanceManager.isLowEnd ? 20 : (PerformanceManager.isMobile ? 25 : 40);
                for(let i = 0; i < reflSteps; i++) {
                    const f = i / reflSteps;
                    const ry = horizonY + f * (state.height - horizonY);
                    const wave = Math.sin(state.animTime * 3.5 + i * 0.4) * 5 * (1-f);
                    const rw = (state.height * 0.1 + z * state.height * 0.5) * (1 - f * 0.7);
                    bCtx.globalAlpha = (1 - f) * 0.6;
                    bCtx.fillStyle = sunColor;
                    if(sunColor !== 'rgba(0,0,0,0)') bCtx.fillRect(sx - rw/2 + wave, ry, rw, 1.5);
                }
                bCtx.restore();
            }

            // Grid - Optimizado
            bCtx.strokeStyle = pal.neonCyan;
            bCtx.globalAlpha = 0.15; bCtx.lineWidth = 0.5;
            bCtx.beginPath();
            const gridCX = state.width / 2 + (lookX * state.width * 4);
            
            // Reducir líneas en low-end
            const lineCount = PerformanceManager.isLowEnd ? 15 : 20;
            const lineStep = PerformanceManager.isLowEnd ? 5 : 4;
            for(let i = -lineCount; i <= lineCount; i+=lineStep) {
                bCtx.moveTo(gridCX + i*4, horizonY);
                bCtx.lineTo(gridCX + i*500, state.height);
            }
            
            const lineSpacing = 15;
            const gridSpeed = (state.animTime * 50) % lineSpacing;
            const horizLines = PerformanceManager.isLowEnd ? 10 : 20;
            for(let i = 0; i < horizLines; i++) {
                const dist = i * lineSpacing + gridSpeed;
                const pz = dist / 250;
                if (pz > 1) continue;
                const hy = horizonY + (pz*pz) * (state.height - horizonY);
                bCtx.moveTo(0, hy); bCtx.lineTo(state.width, hy);
            }
            bCtx.stroke();

            // Bruma Neon 
            const fog = bCtx.createLinearGradient(0, horizonY - 2, 0, horizonY + 15);
            fog.addColorStop(0, 'rgba(0,0,0,0)');
            fog.addColorStop(0.4, skyBot);
            fog.addColorStop(1, 'rgba(0,0,0,0)');
            bCtx.fillStyle = fog; bCtx.globalAlpha = 0.6;
            bCtx.fillRect(0, horizonY - 2, state.width, 17);
            bCtx.globalAlpha = 1;

            // Render Final
            ctx.drawImage(buffer, 0, 0, canvas.width, canvas.height);
            
            // Aberración cromática / CRT Glitch - Throttled y optimizado
            const now = Date.now();
            if (now - state.lastGlitchTime > state.glitchInterval) {
                if (Math.random() > 0.99) {
                    ctx.globalAlpha = 0.1;
                    ctx.drawImage(canvas, 3, 0);
                    ctx.drawImage(canvas, -3, 0);
                    ctx.globalAlpha = 1.0;
                    state.lastGlitchTime = now;
                    state.glitchInterval = 5000 + Math.random() * 10000; // 5-15s entre glitches
                }
            }

            requestAnimationFrame(draw);
        }

        // Inicializar con calidad adaptada
        initStars(Math.round(300 * PerformanceManager.getQualityMultiplier()));
        initMountains();
        resize();
        draw(0);

        // ==========================================
        // 2. SISTEMA DE AUDIO GENERATIVO (MODULAR)
        // ==========================================
        const btnStart = document.getElementById('btn-start');
        const audioOverlay = document.getElementById('audio-overlay');

        // El motor de audio vive en un archivo separado para proteger la logica de canvas.
        const synthEngine = new window.SynthwaveAudioEngine({
            documentRef: document,
            isMobile: PerformanceManager.isMobile,
            isLowEnd: PerformanceManager.isLowEnd
        });

        // Se expone para depuracion manual desde consola sin afectar el render visual.
        window.sunsettingSynthEngine = synthEngine;

        btnStart.addEventListener('click', async () => {
            try {
                await synthEngine.start();
                audioOverlay.style.display = 'none';
            } catch (error) {
                // Si algo falla en audio, se mantiene el overlay para permitir reintento.
                console.error('No se pudo iniciar el motor de audio:', error);
            }
        });

        window.addEventListener('beforeunload', () => {
            synthEngine.destroy();
        });

    </script>
</body>
</html>
