<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Gradient for gear -->
    <linearGradient id="gearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#D4A800"/>
      <stop offset="100%" style="stop-color:#A68500"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main Gear -->
  <g filter="url(#shadow)">
    <!-- Outer gear teeth -->
    <path d="M100 20 
             L110 25 L115 20 L120 25 L130 20 L135 30 
             L145 25 L150 35 L160 35 L165 45 
             L175 45 L175 55 L180 65 L175 75 
             L180 85 L175 95 L180 105 L175 115 
             L180 125 L175 135 L165 140 L165 150 
             L155 155 L150 165 L140 165 L135 170 
             L125 175 L115 175 L110 180 L100 180 
             L90 180 L85 175 L75 175 L65 170 
             L60 165 L50 165 L45 155 L35 150 
             L35 140 L25 135 L20 125 L25 115 
             L20 105 L25 95 L20 85 L25 75 
             L20 65 L25 55 L25 45 L35 45 
             L40 35 L50 35 L55 25 L65 30 
             L70 20 L80 25 L85 20 L90 25 Z" 
          fill="url(#gearGradient)" 
          stroke="#0D0D0D" 
          stroke-width="3"/>
    
    <!-- Inner circle (hole) -->
    <circle cx="100" cy="100" r="35" fill="#0D0D0D"/>
    
    <!-- C Letter inside -->
    <path d="M115 70 
             C145 70 145 130 115 130 
             L100 130 
             L100 115 
             L110 115 
             C125 115 125 85 110 85 
             L100 85 
             L100 70 Z" 
          fill="url(#gearGradient)" 
          stroke="none"/>
  </g>
</svg>
